<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="navbar-container"></div>

    <div class="content-container">

        <section class="checkout-page">

  <div class="checkout-grid">

    <div class="checkout-form">
        <h2>Shipping Details</h2>

        <input type="text" placeholder="Full Name" id="name">
        <input type="text" placeholder="Phone Number" id="phone">
        <textarea placeholder="Address" id="address"></textarea>

        <div class="payment-card" onclick="openPaymentModal()">
        <div class="payment-left">
            <img id="payment-icon" src="https://img.icons8.com/ios-filled/50/ffffff/wallet.png"/>
            
            <div>
            <div class="payment-title">Payment Method</div>
            <div id="selected-payment" class="payment-sub">
                Choose payment
            </div>
            </div>
        </div>

        <div class="payment-arrow">›</div>
        </div>

        <button class="btn-shop" onclick="placeOrder()">
            Place Order
        </button>
    </div>

    <div class="checkout-summary">
      <h2>Order Summary</h2>

      <div id="checkout-items"></div>

      <div class="summary-total">
        <h3 id="checkout-total"></h3>
      </div>
    </div>

  </div>

</section>

<div id="payment-modal" class="payment-modal">
  <div class="payment-box">

    <h2>Select Payment</h2>

    <div class="payment-options">

      <div class="pay-item" onclick="selectPayment('ShopeePay', this)">
        <img src="https://img.icons8.com/color/48/shopee.png"/>
        ShopeePay
      </div>

      <div class="pay-item" onclick="selectPayment('QRIS', this)">
        <img src="assets/icons/qris-white.png"/>
        QRIS
      </div>

      <div class="pay-item" onclick="selectPayment('Bank BCA', this)">
        <img src="assets/icons/bca.svg"/>
        BCA
      </div>

      <div class="pay-item" onclick="selectPayment('Bank BRI', this)">
        <img src="assets/icons/bri.svg"/>
        BRI
      </div>

      <div class="pay-item" onclick="selectPayment('Bank Mandiri', this)">
        <img src="assets/icons/mandiri.svg"/>
        Mandiri
      </div>

      <div class="pay-item" onclick="selectPayment('Virtual Account', this)">
        <img src="https://img.icons8.com/fluency/48/receipt.png"/>
        Virtual Account
      </div>

      <div class="pay-item" onclick="selectPayment('Debit / Credit Card', this)">
        <img src="https://img.icons8.com/fluency/48/bank-card-front-side.png"/>
        Debit / Credit Card
      </div>

    </div>

  </div>

  <div id="payment-process" class="process-modal hidden">

    <div class="process-box">
        <div class="loader"></div>

        <h3 id="process-title">Processing Payment...</h3>
        <p id="process-sub">Please wait</p>

        </div>

    </div>

    </div>

<div id="success-modal" class="success-modal hidden">

  <div class="success-box">

    <div class="success-icon">✓</div>

    <h2>Payment Successful</h2>

    <p id="order-id">Order ID: -</p>

    <p class="success-sub">
      Your order has been confirmed.
    </p>

    <button class="btn-primary" onclick="backToCart()">
      Back to Cart
    </button>

  </div>

</div>

</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/navbar.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
<script src="js/checkout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  loadCheckout();
});
</script>

</body>
</html>
